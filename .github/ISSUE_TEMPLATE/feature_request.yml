name: Feature request
description: Suggest an improvement for the JLab web app or public API.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

        Features specific to the **desktop client** belong in [NeikiDev/jlab-desktop](https://github.com/NeikiDev/jlab-desktop/issues).

  - type: dropdown
    id: surface
    attributes:
      label: Which part of JLab does this affect?
      options:
        - Web app (jlab.threat.rip)
        - Public API
        - API docs / developer experience
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case first. "I want X so I can Y."
      placeholder: |
        When I scan a JAR via the API I cannot tell which severity bucket a signature belongs to without a second lookup.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the change look like from a user's point of view? Be specific.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you discarded them.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Mockups, links, prior art, related issues.
    validations:
      required: false

  - type: checkboxes
    id: agreements
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
